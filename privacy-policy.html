  <title>铃声精灵隐私政策</title>
  <style>
    body {
      max-width: 760px;
      margin: 0 auto;
      padding: 40px 20px;
      color: #1f2937;
      font: 16px/1.65 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

    h1, h2 { color: #111827; line-height: 1.25; }

<body>
  <h1>铃声精灵隐私政策</h1>
  <p>更新日期：2026 年 4 月 25 日</p>

  <h2>我们收集的数据</h2>
  <p>铃声精灵不会收集、上传、出售或共享你的个人数据。</p>

  <h2>媒体文件处理</h2>
  <p>你选择的音频文件或相册视频仅在你的设备本地处理，用于预览、裁剪和导出铃声文件。应用不会把这些文件上传到服务器。</p>

  <h2>相册访问</h2>
  <p>当你选择“从相册视频提取音乐”时，应用会请求访问你选择的视频文件。应用只会读取你主动选择的内容。</p>

  <h2>网络与分析</h2>
  <p>铃声精灵不包含账号系统、广告、第三方分析 SDK 或追踪功能。</p>

  <h2>联系我们</h2>
  <p>如有隐私相关问题，请通过 App Store 页面提供的支持方式联系我们。</p>
</body>
