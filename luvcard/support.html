      <h2>常见问题</h2>
      <p><strong>如何绑定对方？</strong><br>首次进入 App 后，生成邀请码或二维码，让对方输入邀请码或扫描二维码完成 1 对 1 绑定。</p>
      <p><strong>买断是否两个人都要买？</strong><br>不用。一方完成 Lifetime Unlock 后，双方都可以解锁全部卡片发放权。</p>
      <p><strong>王牌卡是什么？</strong><br>王牌卡是对方提前发出的特别许可。持有人使用后会直接生效，并写入情侣账本。</p>
